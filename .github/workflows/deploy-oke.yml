name: Deploy to OKE

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed
    branches:
      - main

env:
  OCI_REGISTRY: sa-saopaulo-1.ocir.io
  OCI_NAMESPACE: gruyvux68qma
  HELM_CHART_PATH: ./infra/helm/whatsleft
  HELM_RELEASE_NAME: whatsleft

jobs:
  build-image:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.OCI_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: src/WhatsLeft.API/
          file: src/WhatsLeft.API/Dockerfile
          push: true
          tags: |
            ${{ env.OCI_REGISTRY }}/${{ env.OCI_NAMESPACE }}/whatsleft-api:${{ github.sha }}
            ${{ env.OCI_REGISTRY }}/${{ env.OCI_NAMESPACE }}/whatsleft-api:latest

      - name: Build and Push View Image
        uses: docker/build-push-action@v5
        with:
          context: src/WhatsLeft.View/WhatsLeftView/
          file: src/WhatsLeft.View/WhatsLeftView/Dockerfile
          push: true
          tags: |
            ${{ env.OCI_REGISTRY }}/${{ env.OCI_NAMESPACE }}/whatsleft-view:${{ github.sha }}
            ${{ env.OCI_REGISTRY }}/${{ env.OCI_NAMESPACE }}/whatsleft-view:latest

  deploy-oke:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --kube-apiserver ${{ secrets.KUBE_SERVER }} \
            --kube-token ${{ secrets.KUBE_TOKEN }} \
            --kube-insecure-skip-tls-verify \
            -f ${{ env.HELM_CHART_PATH }}/values-oke.yaml \
            --set api.image.tag=${{ github.sha }} \
            --set view.image.tag=${{ github.sha }} \
            --wait --timeout 5m

  validate-deploy-api:
    runs-on: ubuntu-latest
    needs: deploy-oke
    steps:
      - name: Validate API
        run: echo "TODO - Validate API deployment (e.g. check endpoints or logs)"

  validate-deploy-view:
    runs-on: ubuntu-latest
    needs: deploy-oke
    steps:
      - name: Validate View
        run: echo "TODO - Validate View deployment (e.g. check endpoints or logs)"
