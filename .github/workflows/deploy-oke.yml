name: Deploy to OKE
run-name: "deploy to oke author: ${{ github.actor }} - commit: ${{ github.sha }}"

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed
    branches:
      - main

env:
  OCI_REGISTRY: sa-saopaulo-1.ocir.io
  OCI_NAMESPACE: gruyvux68qma
  HELM_CHART_PATH: ./infra/helm/whatsleft
  HELM_RELEASE_NAME: whatsleft

jobs:
  build-image:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.OCI_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: src/WhatsLeft.API/
          file: src/WhatsLeft.API/Dockerfile
          push: true
          tags: |
            ${{ env.OCI_REGISTRY }}/${{ env.OCI_NAMESPACE }}/whatsleft-api:${{ github.sha }}
            ${{ env.OCI_REGISTRY }}/${{ env.OCI_NAMESPACE }}/whatsleft-api:latest

      - name: Build and Push View Image
        uses: docker/build-push-action@v5
        with:
          context: src/WhatsLeft.View/WhatsLeftView/
          file: src/WhatsLeft.View/WhatsLeftView/Dockerfile
          push: true
          tags: |
            ${{ env.OCI_REGISTRY }}/${{ env.OCI_NAMESPACE }}/whatsleft-view:${{ github.sha }}
            ${{ env.OCI_REGISTRY }}/${{ env.OCI_NAMESPACE }}/whatsleft-view:latest

  deploy-oke:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Helm
        run: |
          helm dependency update ${{ env.HELM_CHART_PATH }}
          
          # Tenta fazer um rollback caso o deploy anterior tenha falhado e travado o release
          helm rollback ${{ env.HELM_RELEASE_NAME }} \
            --kube-apiserver ${{ secrets.KUBE_SERVER }} \
            --kube-token ${{ secrets.KUBE_TOKEN }} \
            --kube-insecure-skip-tls-verify || true
            
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --kube-apiserver ${{ secrets.KUBE_SERVER }} \
            --kube-token ${{ secrets.KUBE_TOKEN }} \
            --kube-insecure-skip-tls-verify \
            -f ${{ env.HELM_CHART_PATH }}/values-oke.yaml \
            --set api.image.tag=${{ github.sha }} \
            --set view.image.tag=${{ github.sha }} \
            --wait --timeout 5m --atomic

  validate-deploy-api:
    runs-on: ubuntu-latest
    needs: deploy-oke
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate API
        run: |
          mkdir -p ~/.kube
          kubectl config set-cluster oke --server=${{ secrets.KUBE_SERVER }} --insecure-skip-tls-verify=true
          kubectl config set-credentials github --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context default --cluster=oke --user=github
          kubectl config use-context default
          
          kubectl port-forward svc/${{ env.HELM_RELEASE_NAME }}-api 8080:8080 &
          sleep 5
          python infra/validate_health.py http://localhost:8080/health

  validate-deploy-view:
    runs-on: ubuntu-latest
    needs: deploy-oke
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate View
        run: |
          mkdir -p ~/.kube
          kubectl config set-cluster oke --server=${{ secrets.KUBE_SERVER }} --insecure-skip-tls-verify=true
          kubectl config set-credentials github --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context default --cluster=oke --user=github
          kubectl config use-context default
          
          kubectl port-forward svc/${{ env.HELM_RELEASE_NAME }}-view 8081:80 &
          sleep 5
          python infra/validate_ui.py http://localhost:8081
