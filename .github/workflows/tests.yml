name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: src/WhatsLeft.View/WhatsLeftView
        run: npm ci

      - name: Run Tests
        working-directory: src/WhatsLeft.View/WhatsLeftView
        run: npm run test -- --watch=false
