name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: src/WhatsLeft.View/WhatsLeftView
        run: npm ci

      - name: Run Build
        working-directory: src/WhatsLeft.View/WhatsLeftView
        run: npm run build

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: src/WhatsLeft.View/WhatsLeftView
        run: npm ci

      - name: Run Tests
        working-directory: src/WhatsLeft.View/WhatsLeftView
        run: npm run test -- --watch=false

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore Dependencies
        working-directory: src/WhatsLeft.API
        run: dotnet restore

      - name: Run Build
        working-directory: src/WhatsLeft.API
        run: dotnet build --no-restore