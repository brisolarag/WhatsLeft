<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h2 class="modal-title">Edit Transaction</h2>
    <p class="modal-subtitle">{{ transaction.description }} (R$ {{ transaction.amount | number:'1.2-2' }})</p>

    <div class="form-group">
      <label for="expectedInput">Expected Date</label>
      <input type="date" id="expectedInput" [(ngModel)]="expectedDateStr" class="date-input" />
    </div>

    <div class="form-group">
      <label for="finalInput">Final Date</label>
      <input type="date" id="finalInput" [(ngModel)]="finalDateStr" class="date-input" />
      <small class="hint-text">Leave empty if not received/paid yet.</small>
    </div>
    
    <div class="shortcut-hint">
      Press <strong>Ctrl + H</strong> inside an input to insert today's date.
    </div>

    <div class="modal-actions">
      <!-- Gray Cancel Button (X icon) -->
      <button class="btn-cancel" (click)="onCancel()" aria-label="Cancel">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Green Confirm Button (Check icon) -->
      <button class="btn-confirm" (click)="onSave()" aria-label="Confirm">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
        </svg>
      </button>
    </div>
  </div>
</div>
