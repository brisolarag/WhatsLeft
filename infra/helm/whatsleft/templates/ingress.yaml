{{- if .Values.ingress.enabled -}}
{{- $fullName := include "whatsleft.fullname" . -}}
{{- $apiServiceName := printf "%s-api" $fullName -}}
{{- $apiServicePort := .Values.api.service.port -}}
{{- $viewServiceName := printf "%s-view" $fullName -}}
{{- $viewServicePort := .Values.view.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    app.kubernetes.io/name: {{ include "whatsleft.name" . }}
    helm.sh/chart: {{ include "whatsleft.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .backend "api" }}{{ $apiServiceName }}{{ else }}{{ $viewServiceName }}{{ end }}
                port:
                  number: {{ if eq .backend "api" }}{{ $apiServicePort }}{{ else }}{{ $viewServicePort }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
