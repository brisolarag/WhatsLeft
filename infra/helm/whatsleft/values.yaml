api:
  replicaCount: 1
  image:
    repository: whatsleft-api
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

view:
  replicaCount: 1
  image:
    repository: whatsleft-view
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 80
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: whatsleft.local
      paths:
        - path: /
          pathType: Prefix
          backend: view
        - path: /api
          pathType: Prefix
          backend: api
  tls: []
  #  - secretName: whatsleft-tls
  #    hosts:
  #      - whatsleft.local
